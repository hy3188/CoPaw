name: Build Linux ARM64
on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Get version
        id: version
        run: echo "version=$(sed -n 's/^__version__[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' src/copaw/__version__.py)" >> $GITHUB_OUTPUT

      - name: Build binary via Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace arm64v8/ubuntu:22.04 bash -e -c '
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -y
          apt-get install -y curl git build-essential software-properties-common zlib1g-dev libffi-dev
          
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs
          
          apt-get install -y python3.10 python3.10-venv python3.10-dev python3.10-distutils
          curl -sS https://bootstrap.pypa.io/get-pip.py | python3.10
          
          cd console
          npm ci
          npm run build
          cd ..
          
          mkdir -p src/copaw/console
          cp -R console/dist/. src/copaw/console/
          
          python3.10 -m pip install --upgrade pip
          python3.10 -m pip install -e .
          python3.10 -m pip install pyinstaller
          
          python3.10 -m pyinstaller --onefile --add-data "src/copaw/console:copaw/console" --name CoPaw-Linux-arm64 src/copaw/main.py
          chmod -R 777 dist/
          '

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CoPaw-Linux-arm64-${{ steps.version.outputs.version }}
          path: dist/CoPaw-Linux-arm64

      - name: Upload to Release (If triggered by release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/CoPaw-Linux-arm64
          fail-on-unmatched-files: false
